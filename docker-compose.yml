version: '3.8'

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: aptransco_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aptransco
      POSTGRES_USER: aptransco
      POSTGRES_PASSWORD: aptransco_docker_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aptransco -d aptransco"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Node.js Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aptransco_backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: production
      DATABASE_URL: postgresql://aptransco:aptransco_docker_2026@postgres:5432/aptransco?schema=public
      JWT_SECRET: docker_test_jwt_secret_aptransco_2026_change_in_production
      JWT_EXPIRY: 7d
      JWT_REFRESH_EXPIRY: 30d
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      MAX_FILE_SIZE: 5242880
      ALLOWED_MIME_TYPES: application/pdf,image/jpeg,image/png,image/jpg
      CLAMAV_ENABLED: "false"
      EMAIL_SERVICE_URL: https://aptrservice.aptransco.gov.in/api/noreply
      EMAIL_SERVICE_ATTACHMENT_URL: https://aptrservice.aptransco.gov.in/api/noreplyattachment
      MORGAN_LOG_FORMAT: dev
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ── Student Frontend (port 5173) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001/api/v1
    container_name: aptransco_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ── Admin Portal (port 5174) ─────────────────────────────────────────────────
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001/api/v1
    container_name: aptransco_admin
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
